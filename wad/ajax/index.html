<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Registration</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; }
        form { max-width: 300px; display: flex; flex-direction: column; gap: 10px; }
        input, button { padding: 10px; font-size: 16px; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Register User</h2>
    <form id="registrationForm">
        <input type="text" id="username" placeholder="Username" required>
        <input type="email" id="email" placeholder="Email" required>
        <button type="submit">Submit via AJAX</button>
    </form>

    <script>
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Stop the page from refreshing

            // 1. Get values from the inputs
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const userData = { username: username, email: email };

            // 2. Perform the AJAX POST request using native Fetch API
            // We send this to reqres.in, a free public testing API
            fetch('https://reqres.in/api/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            })
            .then(response => response.json())
            .then(data => {
                alert('AJAX POST Successful! Server responded with ID: ' + data.id);

                // 3. Get existing array from Local Storage, or create a new empty array []
                let userList = JSON.parse(localStorage.getItem('myUsersList')) || [];
                
                // 4. Push the new user data into the array
                userList.push(userData);
                
                // 5. Save the updated array back to Local Storage
                localStorage.setItem('myUsersList', JSON.stringify(userList));

                // 6. Go to the display page
                window.location.href = 'display.html';
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Something went wrong with the AJAX request.');
            });
        });
    </script>

</body>
</html>
