<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Independent CRUD Frontend</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">

    <div class="container" style="max-width: 700px;">
        <h2 class="text-center mb-4 text-dark">Assignment 2.C API Frontend</h2>
        
        <div class="card p-4 mb-4 shadow-sm border-0">
            <h5 id="formTitle" class="text-secondary mb-3">Add New Assignment</h5>
            <form id="apiForm">
                <input type="hidden" id="assignmentId">
                
                <div class="mb-3">
                    <label class="form-label">Assignment Title</label>
                    <input type="text" id="title" class="form-control" placeholder="e.g., File Management Script" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <input type="text" id="description" class="form-control" placeholder="Brief summary of requirements">
                </div>
                <div class="mb-3">
                    <label class="form-label">Score / Marks</label>
                    <input type="number" id="score" class="form-control" placeholder="e.g., 90">
                </div>
                
                <button type="submit" id="submitBtn" class="btn btn-primary w-100 fw-bold">Submit to API</button>
                <button type="button" id="cancelBtn" class="btn btn-secondary w-100 mt-2 d-none" onclick="resetFormState()">Cancel Edit</button>
            </form>
        </div>

        <div class="card p-4 shadow-sm border-0">
            <h5 class="text-secondary mb-3">Stored Database Records (GET)</h5>
            <ul id="recordsContainer" class="list-group">
                </ul>
        </div>
    </div>

    <script>
        // Target your running Node.js / Express backend url pipeline
        const BACKEND_API = 'http://localhost:3000/api/assignments';

        // Load assignments directly when frontend opens in browser
        window.addEventListener('DOMContentLoaded', fetchAllRecords);

        // Handle Form Submission (Both CREATE and UPDATE)
        document.getElementById('apiForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('assignmentId').value;
            const payload = {
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                score: Number(document.getElementById('score').value)
            };

            // If an ID exists, route to PUT endpoint; otherwise use standard POST
            const method = id ? 'PUT' : 'POST';
            const targetUrl = id ? `${BACKEND_API}/${id}` : BACKEND_API;

            try {
                const response = await fetch(targetUrl, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    resetFormState();
                    fetchAllRecords();
                } else {
                    alert('API execution failed.');
                }
            } catch (err) {
                console.error('Error communicating with backend:', err);
                alert('Could not contact API backend. Make sure server.js is running!');
            }
        });

        // READ Operation: Fetch records array from the server
        async function fetchAllRecords() {
            const container = document.getElementById('recordsContainer');
            
            try {
                const res = await fetch(BACKEND_API);
                const items = await res.json();
                container.innerHTML = '';

                if (items.length === 0) {
                    container.innerHTML = `<li class="list-group-item text-center text-muted">No assignments in MongoDB.</li>`;
                    return;
                }

                items.forEach(doc => {
                    container.innerHTML += `
                        <li class="list-group-item d-flex justify-content-between align-items-center mb-2 border rounded shadow-xs">
                            <div>
                                <span class="fw-bold text-primary">${doc.title}</span> 
                                <span class="badge bg-secondary ms-2">Score: ${doc.score || 0}</span>
                                <br><small class="text-muted">${doc.description || 'No description provided'}</small>
                            </div>
                            <div>
                                <button class="btn btn-sm btn-outline-warning me-1" onclick="populateForm('${doc._id}', '${doc.title}', '${doc.description}', ${doc.score})">Edit</button>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteRecord('${doc._id}')">Delete</button>
                            </div>
                        </li>`;
                });
            } catch (err) {
                container.innerHTML = `<li class="list-group-item list-group-item-danger text-center">Failed to fetch data. Is backend server.js active?</li>`;
            }
        }

        // DELETE Operation: Send a request to clear the item by its string ID
        async function deleteRecord(id) {
            if (confirm('Delete this database record?')) {
                try {
                    await fetch(`${BACKEND_API}/${id}`, { method: 'DELETE' });
                    fetchAllRecords();
                } catch (err) {
                    alert('Delete failed.');
                }
            }
        }

        // Setup form styling and configuration to manage edits safely
        function populateForm(id, title, description, score) {
            document.getElementById('assignmentId').value = id;
            document.getElementById('title').value = title;
            document.getElementById('description').value = description;
            document.getElementById('score').value = score;

            document.getElementById('formTitle').innerText = "Modify Existing Entry (PUT)";
            document.getElementById('submitBtn').innerText = "Update Record";
            document.getElementById('submitBtn').className = "btn btn-success w-100 fw-bold";
            document.getElementById('cancelBtn').classList.remove('d-none');
        }

        // Restore interface options to blank defaults
        function resetFormState() {
            document.getElementById('apiForm').reset();
            document.getElementById('assignmentId').value = '';
            document.getElementById('formTitle').innerText = "Add New Assignment";
            document.getElementById('submitBtn').innerText = "Submit to API";
            document.getElementById('submitBtn').className = "btn btn-primary w-100 fw-bold";
            document.getElementById('cancelBtn').classList.add('d-none');
        }
    </script>
</body>
</html>
